<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホワイトねこなで</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* 背景をシンプルに白へ */
            background-color: #ffffff; 
            /* 文字色を読みやすく調整 */
            color: #333;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #message {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 1.5em;
            color: #555;
        }

        /* 猫の画像の設定 */
        #cat-image {
            width: 85vw;
            max-width: 450px;
            border-radius: 30px;
            /* 白背景に映える柔らかな影 */
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #cat-image:active {
            transform: scale(0.96);
        }

        /* エフェクトのスタイル */
        .effect {
            position: absolute;
            pointer-events: none;
            font-size: 2rem;
            animation: moveUp 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes moveUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.4); opacity: 0; }
        }

        .hint {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="message">なでて...？</div>
    
    <img id="cat-image" src="sigeru.jpg" alt="Cat">

    <p class="hint">マウスや指で優しくなでてね</p>

    <script>
        const cat = document.getElementById('cat-image');
        const msg = document.getElementById('message');
        const reactions = ["ゴロゴロ...", "ふにゃ〜", "（うっとり）", "幸せだニャ", "最高だニャ...", "🐾"];

        // マウスを動かしたとき
        cat.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.92) {
                createEffect(e.pageX, e.pageY);
                updateMessage();
            }
        });

        // スマホのタッチ操作
        cat.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (Math.random() > 0.85) {
                createEffect(touch.pageX, touch.pageY);
                updateMessage();
            }
        });

        function updateMessage() {
            if (Math.random() > 0.9) {
                msg.innerText = reactions[Math.floor(Math.random() * reactions.length)];
            }
        }

        function createEffect(x, y) {
            const el = document.createElement('div');
            el.className = 'effect';
            // ハートと肉球をランダムに出す
            el.innerText = Math.random() > 0.4 ? "❤️" : "🐾";
            
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, 800);
        }
    </script>
</body>
</html>
